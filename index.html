<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitLens</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <div class="logo-wrapper">
        <div class="logo"><img src="logo.svg" alt="" /></div>
        <div class="name">GitLens</div>
      </div>
    </header>

    <!-- progress bar  -->
    <div class="progress-bar-container">
      <div class="progress-bar"></div>
    </div>

    <main>
      <!-- user input  -->
      <div class="input-section" id="inputSection">
        <input
          type="text"
          placeholder="Enter GitHub Username"
          id="inputUserName"
        />
        <button class="fetch-button" id="fetchbutton">Fetch</button>
      </div>
      <!-- user information container  -->
      <div class="user-info-section" id="infoContainer">
        <div class="profile-pic" id="profilePic"></div>
        <div class="user-info" id="userInfoContainer"></div>
      </div>

      <!-- working status  -->
      <div class="working-status" id="workingStatus"></div>
    </main>

    <footer>
      <div class="social-links">
        <a
          href="https://www.linkedin.com/in/rohan-korake-720848342/"
          target="_blank"
        >
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/Rohan-Korake" target="_blank">
          <i class="fab fa-github"></i>
        </a>
        <a href="mailto:rohannkorake@gmail.com" target="_blank">
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </footer>

    <script src="src/main.js" type="module"></script>
  </body>
</html>
